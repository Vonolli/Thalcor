# Pages CMS edits content and media only. Astro components remain the source of
# truth for layout, styling, animation, and page structure under /src.
media:
  - name: images
    label: Images
    input: public/media/images
    output: /media/images
    categories: [image]
    rename: safe
  - name: videos
    label: Videos
    input: public/media/videos
    output: /media/videos
    categories: [video]
    rename: safe
  - name: logos
    label: Logos
    input: public/media/logos
    output: /media/logos
    categories: [image]
    rename: safe
  - name: documents
    label: Documents
    input: public/media/documents
    output: /media/documents
    categories: [document]
    rename: safe

content:
  - name: homepage
    label: Homepage
    type: file
    path: content/pages/homepage.yml
    format: yaml
    fields:
      - { name: seoTitle, label: SEO title, type: string, required: true }
      - { name: seoDescription, label: SEO description, type: text, required: true }
      - name: hero
        label: Hero
        type: object
        fields:
          - { name: title, label: Hero wordmark/title, type: string, required: true }
          - { name: subtitle, label: Subtitle, type: string, required: true }
          - { name: body, label: Body copy, type: text, required: true }
          - name: backgroundImage
            label: Hero atmosphere image
            type: image
            options: { media: images }
          - name: backgroundVideo
            label: Optional hero atmosphere video
            type: file
            options: { media: videos }
      - name: footer
        label: Footer horizon
        type: object
        fields:
          - name: horizonImage
            label: Lower horizon image
            type: image
            options: { media: images }
          - { name: text, label: Footer text, type: text, required: true }
      - { name: featuredCategories, label: Featured category IDs, type: string, list: true, required: true }
      - name: process
        label: Venture studio process copy
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string }
          - { name: title, label: Title, type: string }
          - name: steps
            label: Process steps
            type: object
            list: true
            fields:
              - { name: title, label: Title, type: string, required: true }
              - { name: text, label: Description, type: text, required: true }

  - name: mission_categories
    label: Mission categories and homepage tiles
    type: file
    path: content/missions/missions.yml
    format: yaml
    fields:
      - name: categories
        label: Categories
        type: object
        list: true
        fields:
          - { name: id, label: ID, type: string, required: true }
          - { name: title, label: Title, type: string, required: true }
          - { name: description, label: Description, type: text, required: true }
          - name: shapeType
            label: Tile shape type
            type: select
            required: true
            options:
              values: [circle, triangle, square, hexagon]
          - name: iconShape
            label: Intro icon shape
            type: select
            required: true
            options:
              values: [circle, triangle, square, hexagon]
          - { name: order, label: Order, type: number, required: true }
          - { name: visible, label: Visible, type: boolean, default: true }
          - name: items
            label: Tiles
            type: object
            list: true
            fields:
              - { name: title, label: Title / label, type: string, required: true }
              - { name: subtitle, label: Optional supporting text, type: text }
              - name: image
                label: Tile image
                type: image
                required: true
                options: { media: images }
              - { name: alt, label: Alt text, type: string }
              - { name: href, label: Link, type: string, required: true }
              - { name: order, label: Order, type: number, required: true }
              - { name: visible, label: Visible, type: boolean, default: true }

  - name: site_settings
    label: Site settings, navigation, logo
    type: file
    path: content/settings/site.yml
    format: yaml
    fields:
      - { name: name, label: Site name, type: string, required: true }
      - { name: title, label: Default SEO title, type: string, required: true }
      - { name: description, label: Default SEO description, type: text, required: true }
      - { name: url, label: Production URL, type: string, required: true }
      - name: ogImage
        label: Social image
        type: image
        required: true
        options: { media: images }
      - { name: email, label: Contact email, type: string, required: true }
      - { name: tagline, label: Brand tagline, type: text, required: true }
      - name: brandLogo
        label: Brand logo / wordmark upload path
        type: image
        options: { media: logos }
      - name: contactButton
        label: Contact button
        type: object
        fields:
          - { name: label, label: Label, type: string, required: true }
          - { name: url, label: Link, type: string, required: true }
      - name: navigation
        label: Header navigation
        type: object
        list: true
        fields:
          - { name: label, label: Label, type: string, required: true }
          - { name: url, label: Link, type: string, required: true }
      - name: footer
        label: Fallback footer
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string, required: true }
          - { name: text, label: Copy, type: text, required: true }

settings:
  commit:
    templates:
      create: "cms: create {name}"
      update: "cms: update {name}"
      delete: "cms: delete {name}"
      upload: "cms: upload {path}"
