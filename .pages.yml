# Pages CMS edits content and media only. Astro components remain the source of
# truth for layout, styling, animation, and page structure under /src.
media:
  - name: images
    label: Images
    input: public/assets/images
    output: /assets/images
    categories: [image]
    rename: safe
  - name: videos
    label: Videos
    input: public/assets/videos
    output: /assets/videos
    categories: [video]
    rename: safe
  - name: logos
    label: Logos
    input: public/assets/logos
    output: /assets/logos
    categories: [image]
    rename: safe
  - name: documents
    label: Documents
    input: public/assets/documents
    output: /assets/documents
    categories: [document]
    rename: safe

content:
  - name: homepage
    label: Homepage
    type: file
    path: content/pages/homepage.yml
    format: yaml
    fields:
      - name: seoTitle
        label: SEO title
        type: string
        required: true
      - name: seoDescription
        label: SEO description
        type: text
        required: true
      - name: hero
        label: Hero
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string, required: true }
          - { name: headline, label: Headline, type: string, required: true }
          - { name: subheadline, label: Subheadline, type: text, required: true }
          - { name: supporting, label: Supporting copy, type: text, required: true }
          - name: primaryAction
            label: Primary CTA
            type: object
            fields:
              - { name: label, label: Button text, type: string, required: true }
              - { name: url, label: Link, type: string, required: true }
          - name: secondaryAction
            label: Secondary CTA
            type: object
            fields:
              - { name: label, label: Button text, type: string, required: true }
              - { name: url, label: Link, type: string, required: true }
          - { name: telemetryEyebrow, label: Telemetry eyebrow, type: string, required: true }
          - name: telemetry
            label: Telemetry rows
            type: object
            list: true
            fields:
              - { name: label, label: Label, type: string, required: true }
              - { name: value, label: Value, type: string, required: true }
      - name: manifesto
        label: Manifesto section
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string, required: true }
          - { name: title, label: Title, type: string, required: true }
          - { name: intro, label: Introduction, type: text, required: true }
          - { name: paragraphs, label: Panel paragraphs, type: text, list: true, required: true }
      - name: featuredProjects
        label: Featured projects section
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string, required: true }
          - { name: title, label: Title, type: string, required: true }
          - { name: intro, label: Introduction, type: text, required: true }
      - name: process
        label: Process section
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string, required: true }
          - { name: title, label: Title, type: string, required: true }
          - name: steps
            label: Process steps
            type: object
            list: true
            fields:
              - { name: title, label: Title, type: string, required: true }
              - { name: text, label: Description, type: text, required: true }
      - name: labs
        label: Labs section
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string, required: true }
          - { name: title, label: Title, type: string, required: true }
          - { name: intro, label: Introduction, type: text, required: true }
          - { name: panelEyebrow, label: Panel eyebrow, type: string, required: true }
          - { name: panelTitle, label: Panel title, type: string, required: true }
          - { name: items, label: Panel items, type: text, list: true, required: true }

  - name: project_archive
    label: Project archive copy
    type: file
    path: content/pages/projects.yml
    format: yaml
    fields:
      - { name: seoTitle, label: SEO title, type: string, required: true }
      - { name: seoDescription, label: SEO description, type: text, required: true }
      - name: hero
        label: Archive hero
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string, required: true }
          - { name: title, label: Title, type: string, required: true }
          - { name: description, label: Description, type: text, required: true }
      - name: filters
        label: Filter labels
        type: object
        fields:
          - { name: allTitle, label: All projects heading, type: string, required: true }
          - { name: allSignalLabel, label: Signal sort label, type: string, required: true }
          - { name: allAlphabeticalLabel, label: Alphabetical sort label, type: string, required: true }
          - { name: statusTitle, label: Status heading, type: string, required: true }
          - { name: categoryTitle, label: Category heading, type: string, required: true }
      - name: detail
        label: Project detail labels
        type: object
        fields:
          - { name: dossierLabel, label: Dossier label, type: string, required: true }
          - { name: statusLabel, label: Status label, type: string, required: true }
          - { name: categoryLabel, label: Category label, type: string, required: true }
          - { name: clearanceLabel, label: Clearance label, type: string, required: true }
          - { name: featuredLabel, label: Featured value, type: string, required: true }
          - { name: archiveLabel, label: Archive value, type: string, required: true }
          - { name: heroMediaLabel, label: Hero media label, type: string, required: true }
          - { name: fileNotesLabel, label: File notes heading, type: string, required: true }
          - { name: fileNotes, label: File notes, type: text, required: true }
          - { name: externalLinkLabel, label: External link text, type: string, required: true }
          - { name: videoLinkLabel, label: Video link text, type: string, required: true }
          - { name: documentLinkLabel, label: Document link text, type: string, required: true }
          - { name: backLabel, label: Back button text, type: string, required: true }

  - name: projects
    label: Projects
    type: collection
    path: content/projects
    format: yaml-frontmatter
    filename: "{primary}.md"
    view:
      primary: title
      fields: [status, category, featured, order]
      sort: order
      order: asc
    fields:
      - { name: title, label: Project title, type: string, required: true }
      - { name: tagline, label: Card description, type: text, required: true }
      - { name: status, label: Status, type: string, required: true }
      - { name: category, label: Category, type: string, required: true }
      - { name: featured, label: Feature on homepage, type: boolean, default: false }
      - name: heroImage
        label: Hero image
        type: image
        required: true
        options: { media: images }
      - name: previewImage
        label: Card image
        type: image
        required: true
        options: { media: images }
      - name: logoImage
        label: Project logo
        type: image
        options: { media: logos }
      - name: heroVideo
        label: Hero video override
        type: file
        options: { media: videos }
      - name: videoPath
        label: Supporting video
        type: file
        options: { media: videos }
      - name: documentPath
        label: Supporting document
        type: file
        options: { media: documents }
      - { name: externalUrl, label: External link, type: string }
      - { name: order, label: Sort order, type: number, required: true }
      - name: body
        label: Project description
        type: rich-text
        required: true
        options:
          format: markdown
          media: images

  - name: site_settings
    label: Site settings
    type: file
    path: content/settings/site.yml
    format: yaml
    fields:
      - { name: name, label: Site name, type: string, required: true }
      - { name: title, label: Default SEO title, type: string, required: true }
      - { name: description, label: Default SEO description, type: text, required: true }
      - { name: url, label: Production URL, type: string, required: true }
      - name: ogImage
        label: Social image
        type: image
        required: true
        options: { media: images }
      - { name: email, label: Contact email, type: string, required: true }
      - { name: tagline, label: Brand tagline, type: text, required: true }
      - name: brandLogo
        label: Brand logo
        type: image
        required: true
        options: { media: logos }
      - name: contactPage
        label: Contact page
        type: object
        fields:
          - { name: title, label: SEO title, type: string, required: true }
          - { name: description, label: SEO description, type: text, required: true }
          - { name: eyebrow, label: Eyebrow, type: string, required: true }
          - { name: heading, label: Heading, type: string, required: true }
          - { name: intro, label: Introduction, type: text, required: true }
          - { name: panelTitle, label: Panel title, type: string, required: true }
          - { name: panelText, label: Panel copy, type: text, required: true }
      - name: contactCta
        label: Reusable contact CTA
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string, required: true }
          - { name: heading, label: Heading, type: string, required: true }
          - { name: text, label: Description, type: text, required: true }
          - { name: buttonLabel, label: Button text, type: string, required: true }
      - name: navigation
        label: Navigation
        type: object
        list: true
        fields:
          - { name: label, label: Label, type: string, required: true }
          - { name: url, label: Link, type: string, required: true }
      - name: footer
        label: Footer
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string, required: true }
          - { name: text, label: Copy, type: text, required: true }

settings:
  commit:
    templates:
      create: "cms: create {name}"
      update: "cms: update {name}"
      delete: "cms: delete {name}"
      upload: "cms: upload {path}"
