process:
  eyebrow: Operating model
  title: From impossible to investable.
  steps:
    - title: Imagine
      text: Hunt for strange intersections, hidden demand, future behaviors, and ideas with enough myth and utility to deserve a mission.
    - title: Prototype
      text: Turn abstract concepts into artifacts, interfaces, renders, landing pages, prompts, videos, tools, and field tests.
    - title: Validate
      text: Read the signal through behavior, taste, feasibility, cost, technical leverage, and the quality of people it attracts.
    - title: Compound
      text: Convert proof into reusable systems, brands, IP, datasets, operating loops, partnerships, and venture paths.
